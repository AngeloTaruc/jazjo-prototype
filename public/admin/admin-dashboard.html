<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Jazjo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    .dashboardStats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:14px}
    .statCard{border:1px solid rgba(229,231,235,.9);background:#fff;border-radius:16px;padding:14px;text-align:left;cursor:pointer;box-shadow:0 10px 24px rgba(15,23,42,.08)}
    .statCard span{display:block;color:#64748b;font-size:12px;font-weight:900;text-transform:uppercase}
    .statCard strong{display:block;margin-top:6px;font-size:24px;color:#0f172a}
    .modalOverlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
    .modalPanel{width:min(860px,96vw);max-height:88vh;overflow:auto;background:#fff;border-radius:18px;border:1px solid rgba(229,231,235,.9);box-shadow:0 20px 40px rgba(15,23,42,.25)}
    .modalHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(229,231,235,.9)}
    .modalBody{padding:16px}
    @media(max-width:900px){.dashboardStats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24"><path d="M12 2 3 6.5v11L12 22l9-4.5v-11L12 2Zm0 2.3 6.8 3.4L12 11.1 5.2 7.7 12 4.3Z"/></svg>
        </div>
        <div>
          <h2>Jazjo Admin</h2>
          <p>Owner Panel</p>
        </div>
      </div>

      <nav class="nav">
        <a class="active" href="admin-dashboard.html">Dashboard</a>
        <a href="admin-sales.html">Sales Management</a>
        <a href="admin-inventory.html">Inventory Management</a>
        <a href="admin-orders.html">Order Management</a>
        <a href="admin-delivery.html">Delivery Tracking</a>
        <a href="admin-customers.html">Customers</a>
        <a href="admin-rewards.html">Reward Program</a>
        <a href="admin-reports.html">Reports</a>
        <a href="../index.html">Log Out</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1>Dashboard</h1>
          <p>Sales, orders, stocks, and deliveries overview.</p>
        </div>
        <button class="btn back" onclick="history.back()">← Back</button>
      </div>

      <div class="dashboardStats" id="dashboardStats"></div>

      <div class="card">
        <h3 style="margin:0;font-weight:1000;">Recent Orders</h3>
        <table>
          <thead>
            <tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th></tr>
          </thead>
          <tbody><tr><td colspan="6">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="modalOverlay" id="dashboardDetailsModal">
    <div class="modalPanel">
      <div class="modalHead">
        <div id="dashboardModalTitle" style="font-weight:1100;font-size:18px;">Details</div>
        <button type="button" class="btn2" data-close-dashboard-modal>Close</button>
      </div>
      <div class="modalBody" id="dashboardModalBody"></div>
    </div>
  </div>
  <script defer src="../assets/js/panel-data.js"></script></body>
</html>
